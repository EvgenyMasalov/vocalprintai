<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalPrint AI - Baroque Neural Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #fce7f3;
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 45, 117, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .font-baroque {
            font-family: 'Cinzel Decorative', serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .baroque-panel {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 45, 117, 0.2);
            box-shadow: inset 0 0 20px rgba(255, 45, 117, 0.05), 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .baroque-panel::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(255, 45, 117, 0.1);
            pointer-events: none;
            border-radius: inherit;
        }

        .pink-glow {
            text-shadow: 0 0 15px rgba(255, 45, 117, 0.5);
        }

        .pink-border-glow {
            box-shadow: 0 0 15px rgba(255, 45, 117, 0.2);
        }

        /* Custom scrollbar for a more ornate feel */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff2d75;
            border-radius: 10px;
        }

        /* Custom animations for the dashboard */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideInFromBottom {
            from {
                transform: translateY(1.5rem);
            }

            to {
                transform: translateY(0);
            }
        }

        @keyframes slideInFromTop {
            from {
                transform: translateY(-1rem);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-in {
            animation-duration: 1000ms;
            animation-fill-mode: forwards;
        }

        .fade-in {
            animation-name: fadeIn;
        }

        .slide-in-from-bottom-6 {
            animation-name: slideInFromBottom;
        }

        .slide-in-from-top-2 {
            animation-name: slideInFromTop;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
    <script>
        // Simple process polyfill for browser compatibility in Vite
        window.process = { env: { NODE_ENV: 'development' } };
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
